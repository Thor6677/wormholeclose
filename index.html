<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Wormhole Roller – Dynamic Collapse Planner</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="container">
    <h1>Wormhole Roller Tool</h1>

    <section class="wormhole-settings">
      <label>Wormhole Code:
        <input type="text" id="wormhole-input" list="wormhole-list"
               placeholder="Type a wormhole code…" autocomplete="off"/>
        <datalist id="wormhole-list"></datalist>
      </label>

      <div id="wormhole-details" class="hidden">
        <p id="wormhole-info" class="wh-info"></p>

        <label>Current Mass State:
          <select id="wormhole-status">
            <option value="stable">Stable (50–100%)</option>
            <option value="unstable">Unstable (10–50%)</option>
            <option value="critical">Critical (&lt;10%)</option>
          </select>
        </label>

        <label>Goal:
          <select id="wormhole-goal">
            <option value="crit">Crit – get to &lt;10% mass</option>
            <option value="close">Close – fully collapse</option>
          </select>
        </label>

        <button id="start-btn">Start</button>
      </div>
    </section>

    <section id="mass-tracker" class="hidden">
      <h2>Mass Tracker</h2>

      <div class="mass-display">
        <span id="remaining-mass">–</span> t
        &nbsp;(<span id="remaining-pct">–</span>%)
      </div>
      <div class="progress-bar-wrap">
        <div id="progress-bar" class="progress-bar"></div>
      </div>
      <p id="goal-label" class="goal-label"></p>

      <div class="ship-controls">
        <label>Ship Type:
          <select id="ship-type">
            <option value="Battleship">Battleship – cold 200,000 t / hot 300,000 t</option>
            <option value="Cruiser">Cruiser – cold 36,000 t / hot 126,000 t</option>
            <option value="HIC">HIC – cold 830 t / hot 132,400 t</option>
          </select>
        </label>

        <div class="jump-buttons">
          <button id="jump-in-btn">Jump In (Cold)</button>
          <button id="jump-out-btn">Jump Out (Hot)</button>
          <button id="undo-btn" class="secondary">Undo</button>
        </div>
      </div>

      <button id="calc-btn">Calculate Plan</button>
      <div id="plan-output"></div>
    </section>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
